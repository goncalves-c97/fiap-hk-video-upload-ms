apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-upload-ms-webapi-deployment
  namespace: video-upload-ms
  labels:
    app: video-upload-ms-webapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-upload-ms-webapi
  template:
    metadata:
      labels:
        app: video-upload-ms-webapi
    spec:
      containers:
      - name: video-upload-ms-webapi
        image: goncalvesc97/fiap-hk-video-upload-ms:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5000"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"

        # ConfiguraÓÐo do ambiente de banco de dados 
        - name: DB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: video-upload-ms-secret
              key: DB_CONNECTION_STRING
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: video-upload-ms-secret
              key: DB_NAME

        # ConfiguraÓÐo da chave de autenticaÓÐo da API
        - name: API_AUTHENTICATION_KEY
          valueFrom:
            secretKeyRef:
              name: video-upload-ms-secret
              key: API_AUTH_TOKEN